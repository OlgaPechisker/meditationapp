<div class="admin-section">
  <div class="section-header">
    <h2>ניהול תוכן האתר</h2>
    <button class="btn-primary" (click)="openCreate()">+ הוסף תוכן</button>
  </div>

  @if (error()) {
    <div class="alert-error">{{ error() }}</div>
  }

  @if (loading()) {
    <p class="loading">טוען...</p>
  } @else {
    @if (showForm()) {
      <div class="form-card">
        <h3>{{ editing() ? 'עריכת תוכן' : 'תוכן חדש' }}</h3>
        <form [formGroup]="form" (ngSubmit)="save()">
          <div class="form-group">
            <label>מפתח (key)</label>
            <input formControlName="key" [attr.readonly]="editing() ? true : null" />
          </div>
          <div class="form-group">
            <label>תוכן (HTML)</label>
            <textarea formControlName="value" rows="10"></textarea>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">שמור</button>
            <button type="button" class="btn-secondary" (click)="cancel()">ביטול</button>
          </div>
        </form>
      </div>
    }

    <table class="data-table">
      <thead>
        <tr>
          <th>מפתח</th>
          <th>תצוגה מקדימה</th>
          <th>פעולות</th>
        </tr>
      </thead>
      <tbody>
        @for (item of items(); track item.id) {
          <tr>
            <td>{{ item.key }}</td>
            <td class="preview">{{ item.value.substring(0, 80) }}...</td>
            <td class="actions">
              <button class="btn-sm btn-edit" (click)="openEdit(item)">ערוך</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
