<div class="admin-section">
  <div class="section-header">
    <h2>ניהול בלוג</h2>
    <button class="btn-primary" (click)="openCreate()">+ פוסט חדש</button>
  </div>

  @if (error()) {
    <div class="alert-error">{{ error() }}</div>
  }

  @if (loading()) {
    <p class="loading">טוען...</p>
  } @else {
    @if (showForm()) {
      <div class="form-card">
        <h3>{{ editing() ? 'עריכת פוסט' : 'פוסט חדש' }}</h3>
        <form [formGroup]="form" (ngSubmit)="save()">
          <div class="form-row">
            <div class="form-group">
              <label>Slug</label>
              <input formControlName="slug" />
            </div>
            <div class="form-group">
              <label>כותרת</label>
              <input formControlName="title" />
            </div>
          </div>
          <div class="form-group">
            <label>תקציר</label>
            <textarea formControlName="excerpt" rows="2"></textarea>
          </div>
          <div class="form-group">
            <label>תוכן</label>
            <textarea formControlName="content" rows="8"></textarea>
          </div>
          <div class="form-group">
            <label>תמונה (URL)</label>
            <input formControlName="imageUrl" />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary">שמור</button>
            <button type="button" class="btn-secondary" (click)="cancel()">ביטול</button>
          </div>
        </form>
      </div>
    }

    <table class="data-table">
      <thead>
        <tr>
          <th>כותרת</th>
          <th>Slug</th>
          <th>תאריך</th>
          <th>פעולות</th>
        </tr>
      </thead>
      <tbody>
        @for (item of posts(); track item.id) {
          <tr>
            <td>{{ item.title }}</td>
            <td>{{ item.slug }}</td>
            <td>{{ item.publishedAt ?? '—' }}</td>
            <td class="actions">
              <button class="btn-sm btn-edit" (click)="openEdit(item)">ערוך</button>
              <button class="btn-sm btn-delete" (click)="deleteItem(item)">מחק</button>
            </td>
          </tr>
        }
      </tbody>
    </table>
  }
</div>
